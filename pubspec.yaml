name: aura_fashion
description: Aura Fashion - Elevate Your Style
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  provider: ^6.1.2

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0

  # Utils
  shared_preferences: ^2.2.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/onboarding/
    - assets/images/home/
    - assets/images/Product Detail/
    - assets/images/products/mens/
    - assets/images/products/womens/
    - assets/images/products/shoes/
    - assets/icons/
    - assets/images/cart/
    - assets/images/checkout/
    - assets/images/profile/
    - assets/images/order details/
    - assets/images/logo/


