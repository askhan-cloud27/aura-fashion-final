name: aura_fashion
description: "Aura Fashion – Elevate your style with luxury clothing, curated collections, and seamless shopping."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management
  provider: ^6.1.2

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0

  # Utils
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  flutter_stripe: ^12.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/onboarding/
    - assets/images/home/
    - assets/images/Product Detail/
    - assets/images/products/mens/
    - assets/images/products/womens/
    - assets/images/products/shoes/
    - assets/icons/
    - assets/images/cart/
    - assets/images/checkout/
    - assets/images/profile/
    - assets/images/order details/
    - assets/images/logo/

# ─── App Icon Configuration ───────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo/app_icon.png"
    background_color: "#1A3D2B"

# ─── Native Splash Screen Configuration ───────────────────────────────────────
flutter_native_splash:
  color: "#1A3D2B"
  image: "assets/images/logo/app_icon.png"
  image_dark: "assets/images/logo/app_icon.png"
  color_dark: "#1A3D2B"
  android: true
  ios: true
  web: true
  android_12:
    color: "#1A3D2B"
    image: "assets/images/logo/app_icon.png"
